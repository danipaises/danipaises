<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dani Países | DPFC Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #02040a; color: #e2e8f0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .font-tech { font-family: 'Rajdhani', sans-serif; }
        .file-item { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="w-full p-6 flex justify-between items-center bg-slate-950/80 border-b border-slate-800">
        <a href="index.html" class="flex items-center gap-2 text-slate-400 hover:text-white transition group">
            <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i> Voltar
        </a>
        <div class="font-tech font-bold tracking-widest text-amber-500">DPFC CREATOR</div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-start p-6 overflow-auto">
        
        <div class="w-full max-w-3xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-tech font-bold text-white mb-2">Criar Container .DPFC</h1>
                <p class="text-slate-500">Adicione arquivos para criar seu pacote.</p>
            </div>

            <!-- Área de Upload Principal -->
            <div id="dropZone" class="border-2 border-dashed border-slate-700 bg-slate-900/50 rounded-2xl p-8 text-center cursor-pointer hover:border-amber-500 hover:bg-slate-900 transition-all duration-300 mb-6 group relative">
                <div class="pointer-events-none">
                    <i class="fa-solid fa-layer-group text-4xl text-slate-600 mb-3 group-hover:text-amber-500 transition-colors"></i>
                    <h3 class="text-xl font-bold text-white">Toque para adicionar arquivos</h3>
                    <p class="text-slate-500 text-sm mt-2">(Múltiplos arquivos suportados)</p>
                </div>
                <!-- O atributo multiple está aqui, mas o comportamento mobile varia -->
                <input type="file" id="fileInput" class="hidden" multiple>
            </div>

            <!-- Botão Extra para Adicionar Mais (Ajuda no Mobile) -->
            <div id="addMoreContainer" class="hidden mb-4 text-center">
                 <button onclick="document.getElementById('fileInput').click()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-full text-sm border border-slate-600 transition">
                    <i class="fa-solid fa-plus mr-1"></i> Adicionar outro arquivo
                 </button>
            </div>

            <!-- Lista Visual -->
            <div id="fileList" class="space-y-3 mb-6"></div>

            <button id="btn-gerar" onclick="gerarDPFC()" class="hidden w-full bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95 flex items-center justify-center gap-2">
                <i class="fa-solid fa-microchip animate-pulse"></i> COMPILAR PACOTE .DPFC
            </button>
        </div>

    </main>

    <script>
        let filesArchive = [];
        const drop = document.getElementById('dropZone');
        const inp = document.getElementById('fileInput');
        const list = document.getElementById('fileList');
        const btn = document.getElementById('btn-gerar');
        const addMore = document.getElementById('addMoreContainer');

        drop.onclick = () => inp.click();
        drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('border-amber-500'); };
        drop.ondragleave = () => drop.classList.remove('border-amber-500');
        drop.ondrop = (e) => { e.preventDefault(); drop.classList.remove('border-amber-500'); handleFiles(e.dataTransfer.files); };
        
        // Correção importante: Resetar o value do input para permitir selecionar o mesmo arquivo duas vezes se necessário e não bugar
        inp.onchange = (e) => {
            handleFiles(e.target.files);
            inp.value = ''; 
        };

        function handleFiles(files) {
            if (files.length > 0) {
                // Mostra o botão de adicionar mais
                addMore.classList.remove('hidden');
                btn.classList.remove('hidden');
            }

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    filesArchive.push({
                        id: Date.now() + Math.random(), // ID único
                        name: file.name,
                        type: file.type,
                        size: (file.size / 1024).toFixed(1) + ' KB',
                        data: e.target.result
                    });
                    renderList();
                };
                reader.readAsDataURL(file);
            });
        }

        function renderList() {
            list.innerHTML = '';
            if (filesArchive.length === 0) {
                btn.classList.add('hidden');
                addMore.classList.add('hidden');
            }
            
            filesArchive.forEach((f, index) => {
                const item = document.createElement('div');
                item.className = 'file-item bg-slate-800 p-4 rounded-lg flex justify-between items-center border border-slate-700';
                item.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-10 h-10 bg-slate-900 rounded flex-shrink-0 flex items-center justify-center text-amber-500">
                            <i class="fa-solid fa-file"></i>
                        </div>
                        <div class="min-w-0">
                            <div class="text-white font-bold text-sm truncate pr-2">${f.name}</div>
                            <div class="text-slate-500 text-xs">${f.size}</div>
                        </div>
                    </div>
                    <button onclick="removeFile(${index})" class="text-red-400 hover:text-red-300 p-2 ml-2 flex-shrink-0"><i class="fa-solid fa-trash"></i></button>
                `;
                list.appendChild(item);
            });
        }

        function removeFile(index) {
            filesArchive.splice(index, 1);
            renderList();
        }

        function gerarDPFC() {
            if (filesArchive.length === 0) return;
            
            const FILES_JSON = JSON.stringify(filesArchive);

            // Código interno do arquivo .DPFC (Mantido igual, mas seguro)
            const htmlParts = [
                '<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Dani Países Converter</title>',
                '<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">',
                '<style>',
                'body{margin:0;background:#0f172a;color:#fff;font-family:sans-serif;height:100vh;display:flex;overflow:hidden}',
                '.s{width:260px;background:#1e293b;border-right:1px solid #334;display:flex;flex-direction:column}',
                '.br{padding:20px;font-weight:bold;color:#f59e0b;border-bottom:1px solid #334;letter-spacing:1px;font-size:14px}',
                '.ls{flex:1;overflow-y:auto;padding:10px}',
                '.fb{width:100%;text-align:left;background:transparent;border:none;color:#94a3b8;padding:12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:4px;transition:0.2s;font-size:13px}',
                '.fb:hover{background:#334;color:#fff}.fb.active{background:#f59e0b;color:#fff}',
                '.m{flex:1;display:flex;flex-direction:column;background:#020617}',
                '.tb{padding:15px 20px;border-bottom:1px solid #1e293b;background:#0f172a;display:flex;justify-content:space-between;align-items:center}',
                '.ti{font-weight:bold;display:flex;align-items:center;gap:8px}',
                '.acts{display:flex;gap:10px}',
                '.btn{padding:8px 16px;border-radius:6px;font-weight:bold;cursor:pointer;display:flex;align-items:center;gap:6px;border:none;font-size:12px;transition:0.2s}',
                '.bd{background:#3b82f6;color:#fff}.bd:hover{background:#2563eb}',
                '.bc{background:#f59e0b;color:#fff}.bc:hover{background:#d97706}',
                '.cv-panel{position:absolute;top:60px;right:20px;background:#1e293b;padding:15px;border-radius:8px;border:1px solid #334;display:none;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,0.5)}',
                '.cv-opt{display:flex;flex-direction:column;gap:5px}',
                '.bo{background:#0f172a;border:1px solid #334;color:#cbd5e1;padding:8px 12px;border-radius:4px;cursor:pointer;font-size:12px;text-align:left;display:flex;align-items:center;gap:8px}',
                '.bo:hover{border-color:#f59e0b;color:#f59e0b}',
                '.v{flex:1;padding:20px;overflow:auto;display:flex;justify-content:center;align-items:center;position:relative}',
                'img{max-width:100%;box-shadow:0 0 20px rgba(0,0,0,0.5)}iframe{width:100%;height:100%;border:none;background:#fff}',
                'pre{background:#1e293b;padding:20px;border-radius:8px;color:#4ade80;max-width:800px;overflow:auto}',
                '@media(max-width:600px){.s{width:100%;height:30%;border-bottom:1px solid #334;border-right:none}.m{height:70%}}',
                '</style></head><body>',
                '<div class="s"><div class="br"><i class="fa-solid fa-cube"></i> DPFC SYSTEM</div><div class="ls" id="l"></div></div>',
                '<div class="m">',
                '<div class="tb"><div class="ti" id="t">Selecione um arquivo</div><div class="acts" id="ma" style="display:none">',
                '<button class="btn bd" onclick="dl()"><i class="fa-solid fa-download"></i></button>',
                '<button class="btn bc" onclick="tg()"><i class="fa-solid fa-wand-magic-sparkles"></i></button>',
                '</div></div>',
                '<div class="cv-panel" id="cp"><div style="font-size:10px;color:#64748b;margin-bottom:8px">CONVERTER:</div><div class="cv-opt" id="co"></div></div>',
                '<div class="v" id="v"><div style="font-size:3rem;color:#1e293b;font-weight:bold">.DPFC</div></div>',
                '</div>',
                '<script>',
                'const F=', FILES_JSON, ';',
                'let c=-1;',
                'function i(){const l=document.getElementById("l");F.forEach((f,x)=>{const b=document.createElement("button");b.className="fb";b.innerHTML="<i class=\'fa-regular fa-file\'></i> "+f.name;b.onclick=()=>s(x);b.id="b-"+x;l.appendChild(b)});if(F.length>0)s(0)}',
                'function s(x){c=x;const f=F[x];document.querySelectorAll(".fb").forEach(b=>b.classList.remove("active"));document.getElementById("b-"+x).classList.add("active");document.getElementById("t").innerHTML=f.name;document.getElementById("ma").style.display="flex";document.getElementById("cp").style.display="none";rv(f)}',
                'function dl(){if(c<0)return;const f=F[c];d(f.data,f.name)}',
                'function tg(){const p=document.getElementById("cp");if(p.style.display==="block"){p.style.display="none";return}p.style.display="block";const o=document.getElementById("co");o.innerHTML="";const f=F[c];gen(o,f)}',
                'function gen(o,f){const t=f.type;let found=false;',
                'if(t.includes("image")){opt(o,"Salvar PNG","fa-image",()=>d(f.data,cx(f.name,"png")));opt(o,"Nova Aba","fa-external-link",()=>op(f.data));found=true}',
                'else if(t.includes("pdf")){opt(o,"Imprimir","fa-print",()=>pr(f.data));opt(o,"Apresentação","fa-expand",()=>op(f.data));found=true}',
                'else if(t.includes("text")||f.name.endsWith(".txt")){opt(o,"Salvar HTML","fa-code",()=>dh(f.data,f.name));opt(o,"Copiar Texto","fa-copy",()=>cp(f.data));found=true}',
                'if(!found)o.innerHTML="<div style=\'color:#64748b;font-size:10px\'>Sem conversões</div>"}',
                'function opt(p,t,i,fn){const b=document.createElement("button");b.className="bo";b.innerHTML="<i class=\'fa-solid "+i+"\'></i> "+t;b.onclick=fn;p.appendChild(b)}',
                'function rv(f){const v=document.getElementById("v");v.innerHTML="";if(f.type.includes("image"))v.innerHTML="<img src=\'"+f.data+"\'>";else if(f.type.includes("pdf"))v.innerHTML="<iframe src=\'"+f.data+"\'></iframe>";else if(f.type.includes("text")){try{v.innerHTML="<pre>"+atob(f.data.split(",")[1])+"</pre>"}catch(e){}}else v.innerHTML="<div style=\'text-align:center\'>Visualização não suportada</div>"}',
                'function d(u,n){const a=document.createElement("a");a.href=u;a.download=n;a.click()}',
                'function cx(n,e){return n.substring(0,n.lastIndexOf("."))+"."+e}',
                'function op(u){const w=window.open();w.document.write("<iframe src=\'"+u+"\' style=\'border:0;width:100%;height:100%\'></iframe>")}',
                'function pr(u){const w=window.open();w.document.write("<iframe src=\'"+u+"\' style=\'width:100%;height:100%\'></iframe>");setTimeout(()=>w.print(),1000)}',
                'function dh(u,n){try{const t=atob(u.split(",")[1]);const b=new Blob(["<html><body><pre>"+t+"</pre></body></html>"],{type:"text/html"});d(URL.createObjectURL(b),n+".html")}catch(e){}}',
                'function cp(u){try{navigator.clipboard.writeText(atob(u.split(",")[1])).then(()=>alert("Copiado!"))}catch(e){}}',
                'i();',
                '<\/script></body></html>'
            ];

            const blob = new Blob([htmlParts.join('')], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Container_DaniPaises.dpfc";
            a.click();
        }
    </script>
</body>
</html>
